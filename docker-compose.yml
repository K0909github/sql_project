services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    environment:
      PGDATABASE: testdb
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: db
      PGPORT: "5432"
    command: ["python", "main.py"]

volumes:
  pgdata:
